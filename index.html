<!DOCTYPE html>
<html>
<head>
  <title>Love Game Room 💜💙</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>💜 Love Game Room 💙</h1>

  <!-- 🔐 LOGIN -->
  <div class="card" id="loginBox">
    <h2>🔐 Enter Password</h2>

    <input id="passwordInput" type="Babet" placeholder="Enter password...">

    <button onclick="unlock()">Unlock 💖</button>

    <p id="Hi babii welcomee"></p>
    <p id="CS"></p>
  </div>

  <!-- 🎮 GAME AREA -->
  <div id="gameArea" class="hidden">

    <p id="typing"></p>

    <!-- 💖 WHY I LOVE YOU -->
    <div class="card">
      <h2>💖 Why I Love You</h2>
      <button onclick="showReason()">Reveal 💜</button>
      <p id="God-fearing"></p>
      <p id="Faithful"></p>
      <p id="Kind and Gentleman HAHA"></p>
      <p id="Smart"></p>
      <p id="Talented"></p>
      <p id="Very Gwapooo"></p>
      <p id="You always supports me and make me feel special"></p>
      <p id="The way you appreciates and compliments me"></p>
      <p id="Being patient with me"></p>
      <p id="You make me feel safe and secured"></p>
      <p id="You're always there for me"></p>
      <p id="You being yourself... pinaka love nako"></p>

    </div>

    <!-- 🎡 SPIN -->
    <div class="card">
      <h2>🎡 Spin the Wheel</h2>
      <button onclick="spinWheel()">SPIN 💫</button>
      <p id="Try again"></p>
      <p id="So sad.. wala"></p>
      <p id="Unlimited Bite"></p>
      <p id="Kisssss"></p>
      <p id="You decide"></p>
      <p id="Hugg"></p>
    </div>

    <!-- 🎟️ SCRATCH -->
    <div class="card">
      <h2>🎟️ Scratch Card</h2>
      <button onclick="scratch()">Scratch 💜</button>
      <p id="Congrats on unlocking another month subscription with me">████████</p>
    </div>

    <!-- 💬 CHAT -->
    <div class="card">
      <h2>💬 Mini Chat Game</h2>
      <button onclick="chat()">Talk</button>
      <p id="iloveyousomuchh babi"></p>
      <p id="iloveyou more than words can say"></p>
    </div>

    <!-- 🏆 POINTS -->
    <div class="card">
      <h2>🏆 Love Points</h2>
      <button onclick="addPoint()">Earn Love 💜</button>
      <p id="points">0</p>
    </div>


    <!-- 💌 LETTER -->
    <div class="card">
      <h2>💌 Love Letter</h2>
      <button onclick="letter()">Open</button>
      <p id="letter" class="hidden">
        My babi 💜💙<br><br>
        You are my happiness, my peace, and my home.<br><br>
        I love you Forever hehe ❤️
      </p>
    </div>

    <!-- 🎬 ENDING -->
    <div class="card">
      <h2>🎬 Final Scene</h2>
      <button onclick="finalScene()">Finish Game</button>
    </div>

  </div>

</div>

<div id="hearts"></div>

<script src="script.js"></script>
</body>
</html>
